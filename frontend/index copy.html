<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Event Announcement</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Upcoming Events</h1>

  <div id="events"></div>

  <h2>Subscribe</h2>

  <input
    id="email"
    type="email"
    placeholder="Enter email">

  <button onclick="subscribe()">
    Subscribe
  </button>

  <hr>

  <h2>Create Event</h2>

  <input
    id="title"
    type="text"
    placeholder="Event title">

  <input
    id="date"
    type="date">

  <!-- added -->
  <input
    id="time"
    type="time">

  <button onclick="createEvent()">
    Create Event
  </button>

  <script src="app.js"></script>

</body>
</html>
