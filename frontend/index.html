<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Event Announcement</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="wrapper">
    <h1>Upcoming Event</h1>
    <div class="events" id="events"></div>
    <h2>Subscribe</h2>
    <div class="emailBox">
      <input id="email" type="email" placeholder="Enter email">
      <button class="subscribe-btn" onclick="subscribe()">Subscribe</button>
    </div>
    
    <div class="EventBox">
      <h2>Create Event</h2>
      <input id="title" type="text" placeholder="Event title">
      <input id="date" type="date">
      <!-- added -->
      <input id="time" type="time">
      <button class="create-event-btn" onclick="createNewEvent()">
        Create Event
      </button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
